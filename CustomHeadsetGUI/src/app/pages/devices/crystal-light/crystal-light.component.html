<div class="launch-section">
  <button mat-raised-button mat-stroked-button [color]="isLaunching ? 'warn' : 'primary'" (click)="onLaunchHeadset()">
    <mat-icon>{{ isLaunching ? 'stop' : 'play_arrow' }}</mat-icon>
    <span i18n>{{ isLaunching ? 'Cancel Launch' : 'Launch Crystal Light Headset' }}</span>
  </button>
  <p class="launch-info" i18n>Pimax Play must be open and logged in for this to work. Pimax has not provided integration with their DRM so this flaky method needs to be used. It has been {{ daysSinceCrystalLightBlocked }} days since the Crystal Light could start without Pimax Play if Pimax allowed it for everyone.</p>
</div>

<app-headset-settings [config]="headsetConfig" [driverName]="headsetConfig.driverName" [settingField]="headsetConfig.settingField"></app-headset-settings>
